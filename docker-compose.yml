version: '3.8'

x-health-postgres: &health-postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-debate}"]
  interval: 5s
  timeout: 5s
  retries: 5

x-health-redis: &health-redis
  test: ["CMD", "redis-cli", "ping"]
  interval: 5s
  timeout: 5s
  retries: 5

services:
  postgres:
    image: postgres:15-alpine
    profiles: ["development"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-debate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *health-postgres

  redis:
    image: redis:7-alpine
    profiles: ["development"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck: *health-redis

  api:
    build: 
      context: ./backend
    profiles: ["development", "production"]
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_DB_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-debate}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: 
      context: ./backend
    profiles: ["development", "production"]
    environment:
      - SUPABASE_DB_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-debate}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info

  flower:
    image: mher/flower
    profiles: ["development"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      worker:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    profiles: ["development", "production"]
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
